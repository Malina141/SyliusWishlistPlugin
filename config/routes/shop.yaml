malina141_sylius_wishlist_static_welcome:
    path: /static-welcome/{name}
    defaults:
        _controller: Malina141\SyliusWishlistPlugin\Controller\GreetingController::staticallyGreetAction
        name: ~

malina141_sylius_wishlist_dynamic_welcome:
    path: /dynamic-welcome/{name}
    defaults:
        _controller: Malina141\SyliusWishlistPlugin\Controller\GreetingController::dynamicallyGreetAction
        name: ~
